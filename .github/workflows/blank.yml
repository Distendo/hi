name: Kali SSH Clean

on:
  workflow_dispatch:

jobs:
  kali:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: System update (safe)
        run: |
          sudo apt update
          sudo apt install -y \
            curl wget git nano tmux htop \
            python3 python3-pip \
            net-tools iproute2 \
            openssh-client \
            nmap netcat-openbsd

      - name: Install tmate
        run: |
          sudo apt install -y tmate

      - name: Clean terminal
        run: |
          touch ~/.hushlogin
          clear

      - name: Start SSH (tmate clean)
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

          echo "SSH:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

      - name: Keep alive
        run: |
          while true; do
            echo "[KALI-LIKE ENV RUNNING]"
            sleep 60
          done
