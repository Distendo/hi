name: Windows 95 CI - Crash Proof VNC Lab

on:
  workflow_dispatch:
    inputs:
      capture_duration:
        default: '120'
        type: string
      fps:
        default: '2'
        type: string
      polling_interval:
        default: '2'
        type: string

jobs:
  vnc-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install dependencies (minimal stable set)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-i386 qemu-utils \
            ffmpeg netcat-openbsd socat

      - name: Prepare disk
        run: |
          qemu-img create -f qcow2 win95.img 500M

      - name: Start QEMU (stable VNC only)
        run: |
          qemu-system-i386 \
            -machine pc \
            -cpu 486 \
            -m 64 \
            -hda win95.img \
            -vga cirrus \
            -vnc :0 \
            -serial file:qemu_serial.log \
            -boot c \
            -pidfile qemu.pid &
          
          echo "QEMU_PID=$!" >> $GITHUB_ENV

      - name: Wait for VNC (hard guarantee)
        run: |
          echo "Waiting for VNC..."
          for i in {1..40}; do
            if nc -z localhost 5900; then
              echo "VNC READY"
              break
            fi
            sleep 1
          done

      - name: Boot stabilization (safe fixed delay)
        run: |
          sleep 40

      - name: Frame capture engine (CRASH-PROOF MODE)
        run: |
          mkdir -p frames

          DURATION=${{ github.event.inputs.capture_duration }}
          INTERVAL=${{ github.event.inputs.polling_interval }}

          FRAME=0
          START=$(date +%s)

          echo "Starting deterministic capture loop"

          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))

            if [ $ELAPSED -ge $DURATION ]; then
              break
            fi

            FILE="frames/frame_$(printf "%05d" $FRAME).png"

            # CRITICAL FIX: verify VNC before capture
            if nc -z localhost 5900; then
              ffmpeg -y -f vnc -i localhost:0 \
                -frames:v 1 "$FILE" >/dev/null 2>&1

              # VERIFY FILE EXISTS (CRASH PROOF PART)
              if [ -s "$FILE" ]; then
                echo "[OK] $FILE"
              else
                echo "[FAIL] frame $FRAME not captured"
              fi
            else
              echo "[WAIT] VNC not ready"
            fi

            FRAME=$((FRAME + 1))
            sleep "$INTERVAL"
          done

          echo "Capture complete"

      - name: Validate frames (CRITICAL SAFETY CHECK)
        run: |
          COUNT=$(ls -1 frames/*.png 2>/dev/null | wc -l)

          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No frames captured at all"
            exit 1
          fi

          echo "Frames captured: $COUNT"

      - name: Build video (SAFE ORDERED MODE)
        run: |
          ffmpeg -y \
            -framerate ${{ github.event.inputs.fps }} \
            -i frames/frame_%05d.png \
            -c:v libx264 \
            -pix_fmt yuv420p \
            win95_boot.mp4

      - name: Final screenshot (guaranteed fallback chain)
        run: |
          LAST=$(ls -1 frames/frame_*.png 2>/dev/null | tail -1)

          if [ -n "$LAST" ]; then
            cp "$LAST" final.png
          else
            ffmpeg -y -f vnc -i localhost:0 -frames:v 1 final.png || true
          fi

      - name: Shutdown QEMU safely
        run: |
          kill ${{ env.QEMU_PID }} 2>/dev/null || true
          pkill qemu-system-i386 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win95-crash-proof
          path: |
            frames/*.png
            win95_boot.mp4
            final.png
            qemu_serial.log
          retention-days: 7
