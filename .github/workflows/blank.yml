name: Windows 95 CI - Fast Stable VNC Lab

on:
  workflow_dispatch:
    inputs:
      capture_duration:
        default: '120'
        type: string
      fps:
        default: '2'
        type: string
      polling_interval:
        default: '2'
        type: string

jobs:
  vnc-capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install dependencies (MINIMAL + FAST)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-system-i386 qemu-utils \
            ffmpeg netcat-openbsd socat

      - name: Prepare disk
        run: |
          qemu-img create -f qcow2 win95.img 500M

      - name: Start QEMU (VNC optimized)
        run: |
          qemu-system-i386 \
            -machine pc \
            -cpu 486 \
            -m 64 \
            -hda win95.img \
            -vga cirrus \
            -vnc :0 \
            -serial file:qemu_serial.log \
            -boot c \
            -pidfile qemu.pid &
          
          echo "QEMU_PID=$!" >> $GITHUB_ENV

      - name: Wait for VNC
        run: |
          for i in {1..30}; do
            nc -z localhost 5900 && echo "VNC READY" && break
            sleep 1
          done

      - name: Boot stabilization (kept but optimized)
        run: |
          sleep 35

      - name: FAST frame capture engine (OPTIMIZED CORE)
        run: |
          DURATION=${{ github.event.inputs.capture_duration }}
          INTERVAL=${{ github.event.inputs.polling_interval }}

          mkdir -p frames
          FRAME=0
          START=$(date +%s)

          # 🔥 SINGLE ffmpeg STREAM PROCESS (KEY FIX)
          ffmpeg -y -f vnc -i localhost:0 \
            -vf fps=2 \
            -compression_level 1 \
            frames/frame_%05d.png &
          
          FFMPEG_PID=$!
          echo "FFMPEG_PID=$FFMPEG_PID" >> $GITHUB_ENV

          # LIGHT polling loop (NO heavy work)
          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))

            if [ $ELAPSED -ge $DURATION ]; then
              break
            fi

            echo "[RUNNING] ${ELAPSED}s"
            sleep "$INTERVAL"
          done

          kill $FFMPEG_PID 2>/dev/null || true

      - name: Build video (FAST + SAFE ORDER)
        run: |
          ffmpeg -y \
            -framerate ${{ github.event.inputs.fps }} \
            -i frames/frame_%05d.png \
            -c:v libx264 \
            -preset ultrafast \
            -pix_fmt yuv420p \
            win95_boot.mp4

      - name: Final screenshot (FAST fallback chain)
        run: |
          ffmpeg -y -f vnc -i localhost:0 -frames:v 1 final.png \
          || cp $(ls frames/*.png | tail -1) final.png

      - name: Capture QEMU logs
        run: |
          cat qemu_serial.log || true > serial_dump.txt

      - name: Shutdown QEMU (safe)
        run: |
          kill ${{ env.QEMU_PID }} 2>/dev/null || true
          pkill qemu-system-i386 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win95-fast-lab
          path: |
            frames/*.png
            win95_boot.mp4
            final.png
            serial_dump.txt
          retention-days: 7
