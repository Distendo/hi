name: Windows 95 CI - ZERO CRASH Mode

on:
  workflow_dispatch:
    inputs:
      capture_duration:
        default: '120'
        type: string
      interval:
        default: '2'
        type: string

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install dependencies (MINIMAL CORE)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-i386 socat

      - name: Create disk
        run: |
          qemu-img create -f qcow2 win95.img 500M

      - name: Start QEMU (NO VNC, NO GRAPHICS NETWORK)
        run: |
          qemu-system-i386 \
            -machine pc \
            -cpu 486 \
            -m 64 \
            -hda win95.img \
            -vga std \
            -display none \
            -monitor unix:qemu.sock,server,nowait \
            -serial file:qemu.log \
            -boot c \
            -pidfile qemu.pid &
          
          echo "QEMU_PID=$!" >> $GITHUB_ENV

      - name: Wait boot
        run: |
          sleep 40

      - name: ZERO-CRASH capture loop (QEMU screendump)
        run: |
          mkdir -p frames

          DURATION=${{ github.event.inputs.capture_duration }}
          INTERVAL=${{ github.event.inputs.interval }}

          START=$(date +%s)
          FRAME=0

          echo "Starting QEMU screendump capture..."

          while true; do
            NOW=$(date +%s)
            ELAPSED=$((NOW - START))

            if [ $ELAPSED -ge $DURATION ]; then
              break
            fi

            FILE="frames/frame_$(printf "%05d" $FRAME).ppm"

            # 💣 CORE: QEMU internal screenshot command
            echo "screendump $FILE" | socat - UNIX-CONNECT:qemu.sock

            if [ -s "$FILE" ]; then
              echo "[OK] $FILE"
            else
              echo "[FAIL] frame $FRAME"
            fi

            FRAME=$((FRAME + 1))
            sleep "$INTERVAL"
          done

      - name: Convert frames to video (STABLE)
        run: |
          if ls frames/*.ppm 1>/dev/null 2>&1; then
            ffmpeg -y \
              -framerate 2 \
              -i frames/frame_%05d.ppm \
              -c:v libx264 \
              -pix_fmt yuv420p \
              win95.mp4
          else
            echo "No frames found"
            exit 1
          fi

      - name: Final screenshot
        run: |
          LAST=$(ls frames/*.ppm | tail -1)
          cp "$LAST" final.ppm

      - name: Shutdown QEMU
        run: |
          echo "system_powerdown" | socat - UNIX-CONNECT:qemu.sock || true
          kill ${{ env.QEMU_PID }} || true
          pkill qemu-system-i386 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win95-zero-crash
          path: |
            frames/*
            win95.mp4
            final.ppm
            qemu.log
          retention-days: 7
