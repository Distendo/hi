###############################################################################
  centos:
    if: github.event.inputs.os == 'centos'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Run CentOS Stream
        run: |
          docker rm -f os || true
          docker run -dit --name os quay.io/centos/centos:stream9

      - name: Install base developer tools
        run: |
          docker exec os bash -c "
            dnf makecache
            dnf install -y epel-release
            dnf install -y \
              tmate git curl wget vim nano htop \
              gcc gcc-c++ make cmake \
              python3 python3-pip nodejs npm \
              net-tools bind-utils \
              strace ltrace gdb valgrind \
              tmux screen rsync \
              openssh jq
          "

      - name: Create UPM wrapper (CentOS)
        run: |
          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              dnf install -y "$PKG"
              ;;
            uninstall)
              dnf remove -y "$PKG"
              ;;
            update)
              dnf makecache
              ;;
            upgrade)
              dnf upgrade -y
              ;;
            search)
              dnf search "$PKG"
              ;;
            info)
              dnf info "$PKG"
              ;;
            clean)
              dnf clean all
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# BUSYBOX (ULTRA MINIMAL)
###############################################################################
  busybox:
    if: github.event.inputs.os == 'busybox'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Run BusyBox container
        run: |
          docker rm -f os || true
          docker run -dit --name os busybox:latest sh

      - name: Install base tools (limited)
        run: |
          docker exec os sh -c "
            apk add --no-cache bash curl wget vim nano htop gcc make python3 tmux screen rsync openssh jq 2>/dev/null || \
            echo 'BusyBox limited - only basic tools available'
          "

      - name: Create UPM wrapper (BusyBox)
        run: |
          docker exec os sh -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/sh
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              echo "BusyBox: use apk add $PKG if Alpine layer present"
              ;;
            update)
              echo "BusyBox: no package manager"
              ;;
            *)
              echo "Usage: upm {install|update} [package] - limited BusyBox mode"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate (if available)
        run: |
          docker exec -d os sh -c "tmate -S /tmp/tmate.sock new-session -d 2>/dev/null || echo 'tmate not available'"
          sleep 3
          docker exec os sh -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null || echo 'No tmate in BusyBox'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# GENTOO (SIMPLIFIED)
###############################################################################
  gentoo:
    if: github.event.inputs.os == 'gentoo'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Run Gentoo
        run: |
          docker rm -f os || true
          docker run -dit --name os gentoo/stage3

      - name: Install base developer tools
        run: |
          docker exec os bash -c "
            emerge-webrsync
            emerge --sync
            emerge \
              dev-vcs/git net-misc/curl app-editors/vim \
              sys-devel/gcc sys-devel/gdb \
              dev-lang/python dev-lang/nodejs \
              app-admin/htop app-shells/tmux \
              net-misc/openssh app-misc/jq
          "

      - name: Create UPM wrapper (Gentoo)
        run: |
          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              emerge "$PKG"
              ;;
            uninstall)
              emerge --unmerge "$PKG"
              ;;
            update)
              emerge --sync
              ;;
            upgrade)
              emerge -uDN @world
              ;;
            search)
              emerge --search "$PKG"
              ;;
            info)
              emerge --info "$PKG"
              ;;
            clean)
              emerge --depclean
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# NIXOS (SIMULATED USERLAND)
###############################################################################
  nixos:
    if: github.event.inputs.os == 'nixos'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Run Nix container
        run: |
          docker rm -f os || true
          docker run -dit --name os nixos/nix

      - name: Install base developer tools
        run: |
          docker exec os bash -c "
            nix-channel --update
            nix-env -iA \
              nixpkgs.git nixpkgs.curl nixpkgs.wget nixpkgs.vim \
              nixpkgs.gcc nixpkgs.gdb nixpkgs.python3 \
              nixpkgs.nodejs nixpkgs.htop nixpkgs.tmux \
              nixpkgs.openssh nixpkgs.jq nixpkgs.tmate
          "

      - name: Create UPM wrapper (NixOS)
        run: |
          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              nix-env -iA nixpkgs."$PKG"
              ;;
            uninstall)
              nix-env --uninstall "$PKG"
              ;;
            update)
              nix-channel --update
              ;;
            upgrade)
              nix-env -u
              ;;
            search)
              nix search nixpkgs "$PKG"
              ;;
            info)
              nix-env -qaP "$PKG" --description
              ;;
            clean)
              nix-collect-garbage
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# UBUNTU SLIM (MINIMAL IMAGE)
###############################################################################
  ubuntu-slim:
    if: github.event.inputs.os == 'ubuntu-slim'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Run slim container
        run: |
          docker rm -f os || true
          docker run -dit --name os ubuntu:24.04-slim

      - name: Install base developer tools
        run: |
          docker exec os bash -c "
            apt-get update -qq
            apt-get install -y \
              tmate git curl wget vim nano htop \
              build-essential gcc g++ make \
              python3 python3-pip nodejs npm \
              net-tools iputils-ping dnsutils \
              strace ltrace gdb valgrind \
              tmux screen rsync \
              openssh-client openssh-server \
              docker.io docker-compose \
              jq yq
          "

      - name: Create UPM wrapper (Ubuntu Slim)
        run: |
          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              apt-get install -y "$PKG"
              ;;
            uninstall)
              apt-get remove -y "$PKG"
              ;;
            update)
              apt-get update -qq
              ;;
            upgrade)
              apt-get upgrade -y
              ;;
            search)
              apt-cache search "$PKG"
              ;;
            info)
              apt-cache show "$PKG"
              ;;
            clean)
              apt-get autoremove -y && apt-get autoclean
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity
