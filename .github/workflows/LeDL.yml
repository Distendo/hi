name: LeDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Select OS"
        required: true
        default: ubuntu
        type: choice
        options:
          - ubuntu
          - arch
          - debian
          - alpine
          - fedora
          - kali
          - macos
          - windows

jobs:

###############################################################################
# UBUNTU
###############################################################################
  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install UPM (Ubuntu)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmate

      - name: Create UPM wrapper
        run: |
          cat << 'EOF' > upm.sh
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              sudo apt-get install -y "$PKG"
              ;;
            update)
              sudo apt-get update -qq
              ;;
          esac
          EOF

          chmod +x upm.sh
          sudo mv upm.sh /usr/local/bin/upm

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

      - name: Keep alive
        run: sleep infinity


###############################################################################
# ARCH
###############################################################################
  arch:
    if: github.event.inputs.os == 'arch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os archlinux:latest

      - name: Install UPM (Arch)
        run: |
          docker exec os bash -c "
            pacman -Sy --noconfirm
          "

          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              pacman -S --noconfirm "$PKG"
              ;;
            update)
              pacman -Sy --noconfirm
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: |
          docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: |
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# DEBIAN
###############################################################################
  debian:
    if: github.event.inputs.os == 'debian'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os debian:latest

      - name: Install UPM (Debian)
        run: |
          docker exec os bash -c "
            apt-get update -qq
          "

          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              apt-get install -y "$PKG"
              ;;
            update)
              apt-get update -qq
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# ALPINE
###############################################################################
  alpine:
    if: github.event.inputs.os == 'alpine'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os alpine:latest

      - name: Install UPM (Alpine)
        run: |
          docker exec os sh -c "
            apk add --no-cache bash
          "

          docker exec os sh -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/sh
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              apk add --no-cache "$PKG"
              ;;
            update)
              apk update
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os sh -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: docker exec os sh -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# FEDORA
###############################################################################
  fedora:
    if: github.event.inputs.os == 'fedora'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os fedora:latest

      - name: Install UPM (Fedora)
        run: |
          docker exec os bash -c "
            dnf makecache
          "

          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              dnf install -y "$PKG"
              ;;
            update)
              dnf makecache
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# KALI
###############################################################################
  kali:
    if: github.event.inputs.os == 'kali'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os kalilinux/kali-rolling:latest

      - name: Install UPM (Kali)
        run: |
          docker exec os bash -c "
            apt-get update -qq
          "

          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              apt-get install -y "$PKG"
              ;;
            update)
              apt-get update -qq
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# MACOS
###############################################################################
  macos:
    if: github.event.inputs.os == 'macos'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install UPM (macOS)
        run: |
          brew install tmate

          cat << 'EOF' > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              brew install "$PKG"
              ;;
            update)
              brew update
              ;;
          esac
          EOF

          chmod +x /usr/local/bin/upm

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

      - name: Keep alive
        run: sleep 1000d

###############################################################################
# WINDOWS (with tmate via QEMU + Alpine + SSH forwarding)
###############################################################################
  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install QEMU and dependencies
        shell: powershell
        run: |
          choco install qemu -y
          choco install wget -y
          choco install msys2 -y

      - name: Download Alpine Linux ISO
        shell: powershell
        run: |
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-standard-3.19.1-x86_64.iso -OutFile alpine.iso

      - name: Create disk image
        shell: powershell
        run: |
          qemu-img create -f qcow2 alpine.qcow2 2G

      - name: Start QEMU with Alpine and tmate
        shell: powershell
        run: |
          Start-Process -NoNewWindow -FilePath "qemu-system-x86_64" -ArgumentList @(
            "-machine", "pc",
            "-cpu", "qemu64",
            "-m", "512",
            "-hda", "alpine.qcow2",
            "-cdrom", "alpine.iso",
            "-boot", "order=d",
            "-vga", "cirrus",
            "-vnc", ":0",
            "-netdev", "user,id=net0,hostfwd=tcp::2222-:22",
            "-device", "e1000,netdev=net0",
            "-serial", "file:qemu_serial.log"
          )
          
          Write-Host "QEMU started with Alpine Linux"
          Write-Host "Waiting for system to boot..."
          Start-Sleep -Seconds 60

      - name: Setup tmate inside Alpine (via SSH)
        shell: powershell
        run: |
          Write-Host "Waiting for SSH to become available..."
          Start-Sleep -Seconds 30
          
          # Установка tmate через Alpine Linux (автоматический логин)
          # Для реальной работы требуется предварительная настройка Alpine с SSH
          Write-Host "=========================================="
          Write-Host "WINDOWS VM WITH TMATE"
          Write-Host "=========================================="
          Write-Host ""
          Write-Host "Для получения SSH доступа к Windows VM:"
          Write-Host ""
          Write-Host "Способ 1 - Подключение через VNC:"
          Write-Host "  В GitHub Actions НЕТ входящих соединений"
          Write-Host "  Используйте outbound tunneling:"
          Write-Host ""
          Write-Host "  Скачайте ngrok: https://ngrok.com"
          Write-Host "  Запустите: ngrok tcp 5900"
          Write-Host "  Подключитесь к VNC через полученный URL"
          Write-Host ""
          Write-Host "Способ 2 - Установка tmate внутри Alpine (рекомендуется):"
          Write-Host ""

      - name: Download and run tmate on Windows directly (using MSYS2)
        shell: powershell
        run: |
          # Скачивание tmate для Windows
          $tmate_url = "https://github.com/tmate-io/tmate/releases/download/2.4.0/tmate-2.4.0-static-windows-amd64.exe"
          $tmate_path = "$env:TEMP\tmate.exe"
          
          Invoke-WebRequest -Uri $tmate_url -OutFile $tmate_path
          
          # Запуск tmate и вывод SSH строки
          Write-Host "Starting tmate on Windows..."
          Write-Host ""
          
          # tmate требует консоль, используем Start-Process с перенаправлением
          $script = @'
          $env:TMATE_SOCK = "C:\tmate.sock"
          & "$env:TEMP\tmate.exe" -S $env:TMATE_SOCK new-session -d
          Start-Sleep -Seconds 5
          & "$env:TEMP\tmate.exe" -S $env:TMATE_SOCK wait tmate-ready
          & "$env:TEMP\tmate.exe" -S $env:TMATE_SOCK display -p '#{tmate_ssh}'
          '@
          
          $script_path = "$env:TEMP\run_tmate.ps1"
          $script | Out-File -FilePath $script_path -Encoding ASCII
          
          # Запуск и захват вывода
          $output = & powershell.exe -ExecutionPolicy Bypass -File $script_path 2>&1
          
          Write-Host "=========================================="
          Write-Host "TMATE SSH CONNECTION (Windows):"
          Write-Host "=========================================="
          Write-Host $output
          Write-Host ""
          
          # Сохраняем SSH строку в файл для artifacts
          $output | Out-File -FilePath tmate_windows.txt

      - name: Alternative - Use ngrok for RDP/VNC (manual)
        shell: powershell
        run: |
          Write-Host "=========================================="
          Write-Host "ALTERNATIVE: ngrok tunneling"
          Write-Host "=========================================="
          Write-Host ""
          Write-Host "1. Создайте аккаунт на ngrok.com"
          Write-Host "2. Добавьте токен в GitHub Secrets: NGROK_AUTH_TOKEN"
          Write-Host ""
          Write-Host "Для автоматического туннеля, добавьте:"
          Write-Host ""
          Write-Host "```yaml"
          Write-Host "- name: ngrok tunnel"
          Write-Host "  run: |"
          Write-Host "    wget https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip"
          Write-Host "    unzip ngrok-v3-stable-windows-amd64.zip"
          Write-Host "    ./ngrok config add-authtoken `${{ secrets.NGROK_AUTH_TOKEN }}"
          Write-Host "    ./ngrok tcp 3389 --log=ngrok.log &"
          Write-Host "```"
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "CURRENT TMATE SSH WINDOWS:"
          Write-Host "=========================================="
          
          if (Test-Path tmate_windows.txt) {
            Get-Content tmate_windows.txt
          } else {
            Write-Host "tmate не запустился на Windows напрямую"
            Write-Host "Используйте Alpine VM внутри QEMU для tmate"
          }

      - name: Setup tmate inside QEMU (Alpine VM with networking)
        shell: powershell
        run: |
          Write-Host ""
          Write-Host "=========================================="
          Write-Host "ALPINE LINUX INSIDE QEMU - TMATE SETUP"
          Write-Host "=========================================="
          Write-Host ""
          Write-Host "Чтобы получить tmate внутри виртуальной машины:"
          Write-Host ""
          Write-Host "1. Подключитесь к Alpine через VNC (5900 порт)"
          Write-Host "2. Войдите как root (без пароля)"
          Write-Host "3. Выполните: apk add tmate"
          Write-Host "4. Запустите: tmate new-session -d"
          Write-Host "5. Получите SSH: tmate display -p '#{tmate_ssh}'"
          Write-Host ""
          Write-Host "ИЛИ автоматически через SSH forward:"
          Write-Host ""
          Write-Host "```bash"
          Write-Host "# В другом терминале:"
          Write-Host "ssh -p 2222 root@localhost  # после настройки SSH в Alpine"
          Write-Host "apk add tmate"
          Write-Host "tmate new-session -d"
          Write-Host "tmate display -p '#{tmate_ssh}'"
          Write-Host "```"
          Write-Host ""

      - name: Save connection info
        shell: powershell
        run: |
          | Out-File -FilePath tmate_connection_info.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-tmate-info
          path: |
            tmate_connection_info.txt
            tmate_windows.txt
            qemu_serial.log
          retention-days: 7

      - name: Keep alive
        shell: powershell
        run: Start-Sleep -Seconds 999999
