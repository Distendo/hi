name: LeDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Select OS (only 1)"
        required: true
        default: arch
        type: choice
        options:
          - ubuntu
          - arch
          - debian
          - alpine
          - fedora
          - kali
          - macos
          - windows
          - void
          - opensuse
          - almalinux
          - centos
          - busybox
          - gentoo
          - nixos
          - ubuntu-slim

jobs:

###############################################################################
# UBUNTU
###############################################################################
  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install base developer tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            tmate \
            git curl wget vim nano htop \
            build-essential gcc g++ make \
            python3 python3-pip nodejs npm \
            net-tools iputils-ping dnsutils \
            strace ltrace gdb valgrind \
            tmux screen rsync \
            openssh-client openssh-server \
            docker.io docker-compose \
            jq yq xmlstarlet

      - name: Create UPM wrapper
        run: |
          cat << 'EOF' > upm.sh
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              sudo apt-get install -y "$PKG"
              ;;
            uninstall)
              sudo apt-get remove -y "$PKG"
              ;;
            update)
              sudo apt-get update -qq
              ;;
            upgrade)
              sudo apt-get upgrade -y
              ;;
            search)
              apt-cache search "$PKG"
              ;;
            info)
              apt-cache show "$PKG"
              ;;
            clean)
              sudo apt-get autoremove -y && sudo apt-get autoclean
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF

          chmod +x upm.sh
          sudo mv upm.sh /usr/local/bin/upm

      - name: Install Docker Compose tools
        run: |
          sudo systemctl start docker || true
          sudo usermod -aG docker $USER || true

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: |
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo ""
          echo "WEB SESSION:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'

      - name: Keep alive
        run: sleep infinity


###############################################################################
# ARCH
###############################################################################
  arch:
    if: github.event.inputs.os == 'arch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os archlinux:latest

      - name: Install base developer tools in container
        run: |
          docker exec os bash -c "
            pacman -Sy --noconfirm
            pacman -S --noconfirm \
              tmate git curl wget vim nano htop \
              gcc g++ make cmake \
              python python-pip nodejs npm \
              net-tools inetutils bind-tools \
              strace ltrace gdb valgrind \
              tmux screen rsync \
              openssh docker docker-compose \
              jq yq
          "

      - name: Create UPM wrapper (Arch)
        run: |
          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              pacman -S --noconfirm "$PKG"
              ;;
            uninstall)
              pacman -R --noconfirm "$PKG"
              ;;
            update)
              pacman -Sy --noconfirm
              ;;
            upgrade)
              pacman -Syu --noconfirm
              ;;
            search)
              pacman -Ss "$PKG"
              ;;
            info)
              pacman -Qi "$PKG"
              ;;
            clean)
              pacman -Scc --noconfirm
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: |
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"
          echo ""
          echo "WEB SESSION:"
          docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_web}'"

      - name: Keep alive
        run: sleep infinity


