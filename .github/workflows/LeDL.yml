              apt-get install -y "$PKG"
              ;;
            update)
              apt-get update -qq
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# MACOS
###############################################################################
  macos:
    if: github.event.inputs.os == 'macos'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install UPM (macOS)
        run: |
          brew install tmate

          cat << 'EOF' > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              brew install "$PKG"
              ;;
            update)
              brew update
              ;;
          esac
          EOF

          chmod +x /usr/local/bin/upm

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

      - name: Keep alive
        run: sleep infinity


###############################################################################
# WINDOWS (no real package system layer)
###############################################################################
  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest

    steps:
      - name: System info
        shell: powershell
        run: systeminfo

      - name: Keep alive
        shell: powershell
        run: Start-Sleep -Seconds 999999
