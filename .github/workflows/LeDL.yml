    if: github.event.inputs.os == 'void'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Run Void container
        run: |
          docker rm -f os || true
          docker run -dit --name os voidlinux/voidlinux

      - name: Install base developer tools
        run: |
          docker exec os bash -c "
            xbps-install -Sy xbps
            xbps-install -Sy \
              tmate git curl wget vim nano htop \
              gcc g++ make cmake \
              python3 nodejs npm \
              net-tools bind-utils \
              strace ltrace gdb \
              tmux screen rsync \
              openssh jq
          "

      - name: Create UPM wrapper (Void)
        run: |
          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              xbps-install -Sy "$PKG"
              ;;
            uninstall)
              xbps-remove -R "$PKG"
              ;;
            update)
              xbps-install -S
              ;;
            upgrade)
              xbps-install -Su
              ;;
            search)
              xbps-query -Rs "$PKG"
              ;;
            info)
              xbps-query -Ri "$PKG"
              ;;
            clean)
              xbps-remove -O
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
