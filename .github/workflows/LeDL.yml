  #############################################################################
  # DEBIAN
  #############################################################################
  debian:
    if: github.event.inputs.os == 'debian'
    runs-on: ubuntu-latest
    timeout-minutes: 10080
    steps:
      - run: docker rm -f os 2>/dev/null || true
      - run: docker run -dit --name os debian:latest
      - run: docker exec os apt-get update -qq && docker exec os apt-get install -y tmate
      - run: docker exec -d os tmate -S /tmp/tmate.sock new-session -d && sleep 5
      - run: docker exec os tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
      - run: sleep 1000d

