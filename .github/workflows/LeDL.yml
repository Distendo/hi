name: ALDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Select OS"
        required: true
        default: ubuntu
        type: choice
        options:
          - ubuntu
          - arch
          - debian
          - alpine
          - fedora
          - kali
          - macos
          - windows

jobs:

###############################################################################
# UBUNTU
###############################################################################
  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      #########################################################################
      # INSTALL CORE
      #########################################################################
      - name: Install packages
        run: |
          sudo apt-get update -qq

          sudo apt-get install -y \
            tmate \
            xterm \
            xvfb \
            xauth \
            x11-apps \
            fluxbox

      #########################################################################
      # CREATE UNIVERSAL PACKAGE MANAGER
      #########################################################################
      - name: Create UPM
        run: |
          cat << 'EOF' > upm
          #!/bin/bash

          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              sudo apt-get install -y "$PKG"
              ;;
            update)
              sudo apt-get update -qq
              ;;
            remove)
              sudo apt-get remove -y "$PKG"
              ;;
            *)
              echo "UPM Commands:"
              echo "upm install <pkg>"
              echo "upm remove <pkg>"
              echo "upm update"
              ;;
          esac
          EOF

          chmod +x upm

          sudo mv upm /usr/local/bin/upm

      #########################################################################
      # START X11 SERVER
      #########################################################################
      - name: Start X11
        run: |
          export DISPLAY=:99

          Xvfb :99 -screen 0 1280x720x24 &
          sleep 3

          fluxbox &
          sleep 2

          echo "DISPLAY=:99" >> $GITHUB_ENV

      #########################################################################
      # CREATE X11 APPLICATION LAUNCHER
      #########################################################################
      - name: Create ALDL-X
        run: |
          cat << 'EOF' > aldl-x
          #!/bin/bash

          export DISPLAY=:99

          APP="$1"

          if [ -z "$APP" ]; then
            echo "Usage:"
            echo "aldl-x xterm"
            exit 1
          fi

          nohup "$APP" >/tmp/aldl-x.log 2>&1 &
          echo "Started: $APP"
          EOF

          chmod +x aldl-x

          sudo mv aldl-x /usr/local/bin/aldl-x

      #########################################################################
      # START TMATE
      #########################################################################
      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d

          sleep 5

          tmate -S /tmp/tmate.sock wait tmate-ready

          echo ""
          echo "=========== ALDL SSH ==========="
          echo ""

          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo ""
          echo "================================"

      #########################################################################
      # START DEFAULT XTERM
      #########################################################################
      - name: Start xterm
        run: |
          export DISPLAY=:99
          aldl-x xterm

      #########################################################################
      # SYSTEM INFO
      #########################################################################
      - name: System info
        run: |
          echo "Kernel:"
          uname -a

          echo ""
          echo "Docker:"
          docker --version || true

          echo ""
          echo "Memory:"
          free -h

          echo ""
          echo "Disk:"
          df -h

      #########################################################################
      # KEEP RUNNER ALIVE
      #########################################################################
      - name: Keep alive
        run: |
          while true; do
            echo "ALDL RUNNING"
            date
            sleep 60
          done

###############################################################################
# ARCH
###############################################################################
  arch:
    if: github.event.inputs.os == 'arch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start Arch container
        run: |
          docker rm -f aldl || true

          docker run -dit \
            --name aldl \
            archlinux:latest \
            bash

      - name: Install system
        run: |
          docker exec aldl bash -c "
            pacman -Sy --noconfirm &&
            pacman -S --noconfirm \
              tmate \
              xterm \
              xorg-xauth \
              xorg-server-xvfb \
              xorg-xhost \
              fluxbox
          "

      - name: Create UPM
        run: |
          docker exec aldl bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash

          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              pacman -S --noconfirm "$PKG"
              ;;
            remove)
              pacman -R --noconfirm "$PKG"
              ;;
            update)
              pacman -Sy --noconfirm
              ;;
          esac
          EOF

          chmod +x /usr/local/bin/upm
          '

      - name: Start X11
        run: |
          docker exec -d aldl bash -c "
            export DISPLAY=:99
            Xvfb :99 -screen 0 1280x720x24 &
            sleep 2
            fluxbox &
          "

      - name: Create ALDL-X
        run: |
          docker exec aldl bash -c '
          cat << "EOF" > /usr/local/bin/aldl-x
          #!/bin/bash

          export DISPLAY=:99

          APP="$1"

          nohup "$APP" >/tmp/aldl-x.log 2>&1 &
          EOF

          chmod +x /usr/local/bin/aldl-x
          '

      - name: Start tmate
        run: |
          docker exec -d aldl bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

          sleep 5

      - name: Show SSH
        run: |
          echo ""
          echo "=========== ALDL ARCH SSH ==========="
          echo ""

          docker exec aldl bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

          echo ""
          echo "====================================="

      - name: Start xterm
        run: |
          docker exec aldl bash -c "
            export DISPLAY=:99
            aldl-x xterm
          "

      - name: Keep alive
        run: |
          while true; do
            echo "ARCH RUNNING"
            sleep 60
          done

###############################################################################
# DEBIAN
###############################################################################
  debian:
    if: github.event.inputs.os == 'debian'
    runs-on: ubuntu-latest

    steps:
      - run: echo "Debian profile placeholder"

###############################################################################
# ALPINE
###############################################################################
  alpine:
    if: github.event.inputs.os == 'alpine'
    runs-on: ubuntu-latest

    steps:
      - run: echo "Alpine profile placeholder"

###############################################################################
# FEDORA
###############################################################################
  fedora:
    if: github.event.inputs.os == 'fedora'
    runs-on: ubuntu-latest

    steps:
      - run: echo "Fedora profile placeholder"

###############################################################################
# KALI
###############################################################################
  kali:
    if: github.event.inputs.os == 'kali'
    runs-on: ubuntu-latest

    steps:
      - run: echo "Kali profile placeholder"

###############################################################################
# MACOS
###############################################################################
  macos:
    if: github.event.inputs.os == 'macos'
    runs-on: macos-latest

    steps:
      - name: Install packages
        run: |
          brew install tmate xterm

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d

          sleep 5

          tmate -S /tmp/tmate.sock wait tmate-ready

          echo ""
          echo "=========== ALDL MACOS SSH ==========="
          echo ""

          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo ""
          echo "======================================"

      - name: Keep alive
        run: |
          while true; do
            echo "MACOS RUNNING"
            sleep 60
          done

###############################################################################
# WINDOWS
###############################################################################
  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest

    steps:
      - name: System info
        shell: powershell
        run: |
          systeminfo

      - name: Keep alive
        shell: powershell
        run: |
          while ($true) {
            Write-Host "WINDOWS RUNNING"
            Start-Sleep 60
          }
