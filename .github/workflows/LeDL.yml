name: ALDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Select OS"
        required: true
        default: ubuntu
        type: choice
        options:
          - ubuntu
          - arch
          - debian
          - alpine
          - fedora
          - kali
          - macos
          - windows

jobs:

###############################################################################
# UBUNTU
###############################################################################
  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      #########################################################################
      # INSTALL PACKAGES
      #########################################################################
      - name: Install packages
        run: |
          sudo apt-get update -qq

          sudo apt-get install -y \
            tmate \
            xterm \
            xvfb \
            xauth \
            x11-apps \
            fluxbox

      #########################################################################
      # CONFIGURE SSH X11
      #########################################################################
      - name: Configure SSH X11
        run: |
          mkdir -p ~/.ssh

          cat << EOF >> ~/.ssh/config
          Host *
              ForwardX11 yes
              ForwardX11Trusted yes
          EOF

      #########################################################################
      # CREATE UPM
      #########################################################################
      - name: Create UPM
        run: |
          cat << 'EOF' > upm
          #!/bin/bash

          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              sudo apt-get install -y "$PKG"
              ;;
            remove)
              sudo apt-get remove -y "$PKG"
              ;;
            update)
              sudo apt-get update -qq
              ;;
            *)
              echo "UPM Commands:"
              echo "upm install <pkg>"
              echo "upm remove <pkg>"
              echo "upm update"
              ;;
          esac
          EOF

          chmod +x upm

          sudo mv upm /usr/local/bin/upm

      #########################################################################
      # START VIRTUAL X11
      #########################################################################
      - name: Start X11 server
        run: |
          export DISPLAY=:99

          Xvfb :99 -screen 0 1280x720x24 &
          sleep 3

          fluxbox &
          sleep 2

          echo "DISPLAY=:99" >> $GITHUB_ENV

      #########################################################################
      # CREATE X11 APP LAUNCHER
      #########################################################################
      - name: Create ALDL-X
        run: |
          cat << 'EOF' > aldl-x
          #!/bin/bash

          export DISPLAY=:99

          APP="$1"

          if [ -z "$APP" ]; then
            echo "Usage:"
            echo "aldl-x xterm"
            exit 1
          fi

          nohup "$APP" >/tmp/aldl-x.log 2>&1 &
          echo "Started: $APP"
          EOF

          chmod +x aldl-x

          sudo mv aldl-x /usr/local/bin/aldl-x

      #########################################################################
      # START TMATE WITH X11
      #########################################################################
      - name: Start tmate with X11
        run: |
          export DISPLAY=:99

          tmate -S /tmp/tmate.sock new-session -d

          sleep 5

          tmate -S /tmp/tmate.sock send-keys "export DISPLAY=:99" C-m

          tmate -S /tmp/tmate.sock wait tmate-ready

          echo ""
          echo "=========== ALDL SSH ==========="
          echo ""

          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo ""
          echo "Connect like this:"
          echo "ssh -Y <SSH_ADDRESS>"
          echo ""

          echo "Then run:"
          echo "xterm"
          echo ""

          echo "================================"

      #########################################################################
      # TEST X11
      #########################################################################
      - name: Start xterm on runner
        run: |
          export DISPLAY=:99
          aldl-x xterm

      #########################################################################
      # SYSTEM INFO
      #########################################################################
      - name: System info
        run: |
          echo "Kernel:"
          uname -a

          echo ""
          echo "DISPLAY:"
          echo $DISPLAY

          echo ""
          echo "Memory:"
          free -h

          echo ""
          echo "Disk:"
          df -h

      #########################################################################
      # KEEP RUNNER ALIVE
      #########################################################################
      - name: Keep alive
        run: |
          while true; do
            echo "ALDL RUNNING"
            date
            sleep 60
          done

###############################################################################
# ARCH
###############################################################################
  arch:
    if: github.event.inputs.os == 'arch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      #########################################################################
      # START CONTAINER
      #########################################################################
      - name: Start Arch container
        run: |
          docker rm -f aldl || true

          docker run -dit \
            --name aldl \
            archlinux:latest \
            bash

      #########################################################################
      # INSTALL PACKAGES
      #########################################################################
      - name: Install packages
        run: |
          docker exec aldl bash -c "
            pacman -Sy --noconfirm &&
            pacman -S --noconfirm \
              tmate \
              xterm \
              xorg-server-xvfb \
              xorg-xauth \
              fluxbox
          "

      #########################################################################
      # CONFIGURE SSH X11
      #########################################################################
      - name: Configure SSH
        run: |
          docker exec aldl bash -c '
            mkdir -p ~/.ssh

            cat << EOF >> ~/.ssh/config
            Host *
                ForwardX11 yes
                ForwardX11Trusted yes
            EOF
          '

      #########################################################################
      # CREATE UPM
      #########################################################################
      - name: Create UPM
        run: |
          docker exec aldl bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash

          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              pacman -S --noconfirm "$PKG"
              ;;
            remove)
              pacman -R --noconfirm "$PKG"
              ;;
            update)
              pacman -Sy --noconfirm
              ;;
          esac
          EOF

          chmod +x /usr/local/bin/upm
          '

      #########################################################################
      # START X11
      #########################################################################
      - name: Start X11
        run: |
          docker exec -d aldl bash -c "
            export DISPLAY=:99

            Xvfb :99 -screen 0 1280x720x24 &
            sleep 3

            fluxbox &
          "

      #########################################################################
      # CREATE ALDL-X
      #########################################################################
      - name: Create ALDL-X
        run: |
          docker exec aldl bash -c '
          cat << "EOF" > /usr/local/bin/aldl-x
          #!/bin/bash

          export DISPLAY=:99

          APP="$1"

          nohup "$APP" >/tmp/aldl-x.log 2>&1 &
          EOF

          chmod +x /usr/local/bin/aldl-x
          '

      #########################################################################
      # START TMATE
      #########################################################################
      - name: Start tmate
        run: |
          docker exec -d aldl bash -c "
            export DISPLAY=:99

            tmate -S /tmp/tmate.sock new-session -d

            sleep 5

            tmate -S /tmp/tmate.sock send-keys 'export DISPLAY=:99' C-m
          "

          sleep 5

      #########################################################################
      # SHOW SSH
      #########################################################################
      - name: Show SSH
        run: |
          echo ""
          echo "=========== ALDL ARCH SSH ==========="
          echo ""

          docker exec aldl bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

          echo ""
          echo "Connect using:"
          echo "ssh -Y <SSH_ADDRESS>"
          echo ""

          echo "Then:"
          echo "xterm"
          echo ""

          echo "====================================="

      #########################################################################
      # START TEST XTERM
      #########################################################################
      - name: Start xterm
        run: |
          docker exec aldl bash -c "
            export DISPLAY=:99
            aldl-x xterm
          "

      #########################################################################
      # KEEP ALIVE
      #########################################################################
      - name: Keep alive
        run: |
          while true; do
            echo "ARCH RUNNING"
            sleep 60
          done

###############################################################################
# MACOS
###############################################################################
  macos:
    if: github.event.inputs.os == 'macos'
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          brew install tmate xquartz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          cat << EOF >> ~/.ssh/config
          Host *
              ForwardX11 yes
              ForwardX11Trusted yes
          EOF

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d

          sleep 5

          tmate -S /tmp/tmate.sock wait tmate-ready

          echo ""
          echo "=========== ALDL MACOS SSH ==========="
          echo ""

          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

          echo ""
          echo "Connect:"
          echo "ssh -Y <SSH_ADDRESS>"
          echo ""

          echo "======================================"

      - name: Keep alive
        run: |
          while true; do
            echo "MACOS RUNNING"
            sleep 60
          done

###############################################################################
# WINDOWS
###############################################################################
  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest

    steps:
      - name: System info
        shell: powershell
        run: |
          systeminfo

      - name: Keep alive
        shell: powershell
        run: |
          while ($true) {
            Write-Host "WINDOWS RUNNING"
            Start-Sleep 60
          }

###############################################################################
# PLACEHOLDERS
###############################################################################
  debian:
    if: github.event.inputs.os == 'debian'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Debian placeholder"

  alpine:
    if: github.event.inputs.os == 'alpine'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Alpine placeholder"

  fedora:
    if: github.event.inputs.os == 'fedora'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Fedora placeholder"

  kali:
    if: github.event.inputs.os == 'kali'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Kali placeholder"
