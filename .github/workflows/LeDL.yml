            uninstall)
              apk del "$PKG"
              ;;
            update)
              apk update
              ;;
            upgrade)
              apk upgrade
              ;;
            search)
              apk search "$PKG"
              ;;
            info)
              apk info "$PKG"
              ;;
            clean)
              apk cache clean
