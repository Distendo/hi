jobs:

  #############################################################################
  # UNIVERSAL TEMPLATE FUNCTION (used by all jobs)
  #############################################################################
  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 10080
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tmate tmux screen htop vim nano git curl wget \
            build-essential gcc g++ make cmake autoconf automake \
            python3 python3-pip python3-venv nodejs npm yarn \
            ruby rustc cargo golang-go php php-cli perl \
            net-tools iputils-ping dnsutils traceroute \
            strace ltrace gdb valgrind clang clang-format \
            openssh-client openssh-server rsync \
            docker.io docker-compose podman \
            jq yq xmlstarlet bc dc \
            unzip zip tar gzip bzip2 xz-utils \
            fzf ripgrep fd-find bat exa \
            tree ncdu duf httpie

      - name: UPM Universal Package Manager
        run: |
          cat << 'EOF' | sudo tee /usr/local/bin/upm
          #!/bin/bash
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          NC='\033[0m'
          
          help_msg() {
              echo "UPM - Universal Package Manager"
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean|list} [package]"
              echo ""
              echo "Commands:"
              echo "  install <pkg>   - Install package"
              echo "  uninstall <pkg> - Remove package"
              echo "  update          - Update package lists"
              echo "  upgrade         - Upgrade all packages"
              echo "  search <term>   - Search for packages"
              echo "  info <pkg>      - Show package info"
              echo "  clean           - Clean package cache"
              echo "  list            - List installed packages"
          }
          
          if [ $# -eq 0 ]; then
              help_msg
              exit 1
          fi
          
          CMD=$1
          PKG=$2
          
          detect_pm() {
              if command -v apt-get &>/dev/null; then echo "apt"
              elif command -v pacman &>/dev/null; then echo "pacman"
              elif command -v dnf &>/dev/null; then echo "dnf"
              elif command -v yum &>/dev/null; then echo "yum"
              elif command -v zypper &>/dev/null; then echo "zypper"
              elif command -v apk &>/dev/null; then echo "apk"
              elif command -v xbps-install &>/dev/null; then echo "xbps"
              elif command -v emerge &>/dev/null; then echo "emerge"
              elif command -v nix-env &>/dev/null; then echo "nix"
              elif command -v brew &>/dev/null; then echo "brew"
              else echo "unknown"
              fi
          }
          
          PM=$(detect_pm)
          
          case "$CMD" in
              install)
                  case "$PM" in
                      apt)   sudo apt-get install -y "$PKG" ;;
                      pacman) sudo pacman -S --noconfirm "$PKG" ;;
                      dnf|yum) sudo dnf install -y "$PKG" ;;
                      zypper) sudo zypper install -y "$PKG" ;;
                      apk)   sudo apk add --no-cache "$PKG" ;;
                      xbps)  sudo xbps-install -Sy "$PKG" ;;
                      emerge) sudo emerge "$PKG" ;;
                      nix)   nix-env -iA nixpkgs."$PKG" ;;
                      brew)  brew install "$PKG" ;;
                      *)     echo -e "${RED}No package manager found${NC}" ;;
                  esac
                  ;;
              uninstall)
                  case "$PM" in
                      apt)   sudo apt-get remove -y "$PKG" ;;
                      pacman) sudo pacman -R --noconfirm "$PKG" ;;
                      dnf|yum) sudo dnf remove -y "$PKG" ;;
                      zypper) sudo zypper remove -y "$PKG" ;;
                      apk)   sudo apk del "$PKG" ;;
                      xbps)  sudo xbps-remove -R "$PKG" ;;
                      emerge) sudo emerge --unmerge "$PKG" ;;
                      nix)   nix-env --uninstall "$PKG" ;;
                      brew)  brew uninstall "$PKG" ;;
                  esac
                  ;;
              update)
                  case "$PM" in
                      apt)   sudo apt-get update -qq ;;
                      pacman) sudo pacman -Sy ;;
                      dnf|yum) sudo dnf makecache ;;
                      zypper) sudo zypper refresh ;;
                      apk)   sudo apk update ;;
                      xbps)  sudo xbps-install -S ;;
                      emerge) sudo emerge --sync ;;
                      nix)   nix-channel --update ;;
                      brew)  brew update ;;
                  esac
                  ;;
              upgrade)
                  case "$PM" in
                      apt)   sudo apt-get upgrade -y ;;
                      pacman) sudo pacman -Syu --noconfirm ;;
                      dnf|yum) sudo dnf upgrade -y ;;
                      zypper) sudo zypper update -y ;;
                      apk)   sudo apk upgrade ;;
                      xbps)  sudo xbps-install -Su ;;
                      emerge) sudo emerge -uDN @world ;;
                      nix)   nix-env -u ;;
                      brew)  brew upgrade ;;
                  esac
                  ;;
              search)
                  case "$PM" in
                      apt)   apt-cache search "$PKG" ;;
                      pacman) pacman -Ss "$PKG" ;;
                      dnf|yum) dnf search "$PKG" ;;
                      zypper) zypper search "$PKG" ;;
                      apk)   apk search "$PKG" ;;
                      xbps)  xbps-query -Rs "$PKG" ;;
                      emerge) emerge --search "$PKG" ;;
                      nix)   nix search nixpkgs "$PKG" ;;
                      brew)  brew search "$PKG" ;;
                  esac
                  ;;
              info)
                  case "$PM" in
                      apt)   apt-cache show "$PKG" ;;
                      pacman) pacman -Qi "$PKG" ;;
                      dnf|yum) dnf info "$PKG" ;;
                      zypper) zypper info "$PKG" ;;
                      apk)   apk info "$PKG" ;;
                      xbps)  xbps-query -Ri "$PKG" ;;
                      emerge) emerge --info "$PKG" ;;
                      nix)   nix-env -qaP "$PKG" --description ;;
                      brew)  brew info "$PKG" ;;
                  esac
                  ;;
              clean)
                  case "$PM" in
                      apt)   sudo apt-get autoremove -y && sudo apt-get autoclean ;;
                      pacman) sudo pacman -Scc --noconfirm ;;
                      dnf|yum) sudo dnf clean all ;;
                      zypper) sudo zypper clean ;;
                      apk)   sudo apk cache clean ;;
                      xbps)  sudo xbps-remove -O ;;
                      emerge) sudo emerge --depclean ;;
                      nix)   nix-collect-garbage ;;
                      brew)  brew cleanup ;;
                  esac
                  ;;
              list)
                  case "$PM" in
                      apt)   apt list --installed ;;
                      pacman) pacman -Q ;;
                      dnf|yum) dnf list installed ;;
                      zypper) zypper se --installed-only ;;
                      apk)   apk list --installed ;;
                      xbps)  xbps-query -l ;;
                      emerge) equery list '*' ;;
                      nix)   nix-env -q ;;
                      brew)  brew list ;;
                  esac
                  ;;
              *)
                  help_msg
                  ;;
          esac
          EOF
          sudo chmod +x /usr/local/bin/upm

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          for i in {1..30}; do
            if tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null | grep -q 'ssh'; then
              break
            fi
            sleep 1
          done

      - name: Show Connection Info
        run: |
          echo "=========================================="
          echo "🔐 TMATE SSH CONNECTION:"
          echo "=========================================="
          SSH_LINE=$(tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' 2>/dev/null)
          WEB_LINE=$(tmate -S /tmp/tmate.sock display -p '#{tmate_web}' 2>/dev/null)
          
          if [ -n "$SSH_LINE" ]; then
            echo "$SSH_LINE"
            echo ""
            echo "Quick connect:"
            echo "$SSH_LINE" | awk '{print "ssh -o StrictHostKeyChecking=no " $4}'
          else
            echo "⚠️  Waiting for tmate connection..."
          fi
          
          echo ""
          echo "=========================================="
          echo "🌐 WEB SESSION:"
          echo "=========================================="
          echo "$WEB_LINE"
          echo ""
          echo "=========================================="
          echo "📦 UPM Package Manager Available"
          echo "   upm install <package>"
          echo "   upm update"
          echo "   upm search <term>"
          echo "=========================================="

      - name: Keep Alive
        run: sleep 1000d

  #############################################################################
  # UBUNTU 22.04
  #############################################################################
  ubuntu-22-04:
    if: github.event.inputs.os == 'ubuntu-22-04'
    runs-on: ubuntu-22.04
    timeout-minutes: 10080
    steps:
      - run: sudo apt-get update -qq && sudo apt-get install -y tmate
      - run: tmate -S /tmp/tmate.sock new-session -d && sleep 5
      - run: tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}' || echo "Waiting..."
      - run: sleep 1000d

  #############################################################################
  # UBUNTU 20.04
  #############################################################################
