    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os fedora:latest

      - name: Install UPM (Fedora)
        run: |
          docker exec os bash -c "
            dnf makecache
          "

          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              dnf install -y "$PKG"
              ;;
            update)
              dnf makecache
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Install tmate via UPM
        run: docker exec os upm install tmate

      - name: Start tmate
        run: |
          docker exec -d os bash -c "tmate -S /tmp/tmate.sock new-session -d"
          sleep 5

      - name: Show SSH
        run: docker exec os bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"

      - name: Keep alive
        run: sleep infinity


###############################################################################
# KALI
###############################################################################
