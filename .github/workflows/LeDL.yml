    if: github.event.inputs.os == 'kali'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker rm -f os || true
          docker run -dit --name os kalilinux/kali-rolling:latest

      - name: Install UPM (Kali)
        run: |
          docker exec os bash -c "
            apt-get update -qq
          "

          docker exec os bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
