###############################################################################
# WINDOWS (with tmate via WSL2/QEMU)
###############################################################################
  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install WSL2 and developer tools
        shell: powershell
        run: |
          wsl --install -d Ubuntu
          wsl --set-default-version 2

      - name: Install base tools via WSL
        shell: powershell
        run: |
          wsl bash -c "
            apt-get update -qq
            apt-get install -y \
              tmate git curl wget vim nano htop \
              build-essential gcc g++ make \
              python3 python3-pip nodejs npm \
              net-tools iputils-ping dnsutils \
              strace ltrace gdb valgrind \
              tmux screen rsync \
              openssh-client openssh-server \
              docker.io docker-compose \
              jq yq
          "

      - name: Create UPM wrapper (Windows/WSL)
        shell: powershell
        run: |
          wsl bash -c '
          cat << "EOF" > /usr/local/bin/upm
          #!/bin/bash
          CMD=$1
          PKG=$2

          case "$CMD" in
            install)
              apt-get install -y "$PKG"
              ;;
            uninstall)
              apt-get remove -y "$PKG"
              ;;
            update)
              apt-get update -qq
              ;;
            upgrade)
              apt-get upgrade -y
              ;;
            search)
              apt-cache search "$PKG"
              ;;
            info)
              apt-cache show "$PKG"
              ;;
            clean)
              apt-get autoremove -y && apt-get autoclean
              ;;
            *)
              echo "Usage: upm {install|uninstall|update|upgrade|search|info|clean} [package]"
              ;;
          esac
          EOF
          chmod +x /usr/local/bin/upm
          '

      - name: Start tmate in WSL
        shell: powershell
        run: |
          wsl bash -c "tmate -S /tmp/tmate.sock new-session -d"
          wsl bash -c "tmate -S /tmp/tmate.sock wait tmate-ready"

      - name: Show SSH
        shell: powershell
        run: |
          echo "=========================================="
          echo "TMATE SSH CONNECTION:"
          echo "=========================================="
          wsl bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'"
          echo ""
          echo "WEB SESSION:"
          wsl bash -c "tmate -S /tmp/tmate.sock display -p '#{tmate_web}'"

      - name: Keep alive
        shell: powershell
        run: wsl bash -c "sleep infinity"

      - name: Alternative - QEMU with Alpine and tmate
        shell: powershell
        run: |
          choco install qemu -y
          wget https://dl-cdn.alpinelinux.org/alpine/v3.19/releases/x86_64/alpine-standard-3.19.1-x86_64.iso -OutFile alpine.iso
          qemu-img create -f qcow2 alpine.qcow2 2G
          
          Start-Process -NoNewWindow -FilePath "qemu-system-x86_64" -ArgumentList @(
            "-machine", "pc",
            "-m", "512",
            "-hda", "alpine.qcow2",
            "-cdrom", "alpine.iso",
            "-vnc", ":0",
            "-netdev", "user,id=net0",
            "-device", "e1000,netdev=net0"
          )


