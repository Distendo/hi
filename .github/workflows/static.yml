name: Windows SSH Session

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System info
        shell: pwsh
        run: |
          systeminfo
          whoami

      - name: Install WSL tools (optional base shell)
        shell: pwsh
        run: |
          Write-Output "Preparing environment..."

      - name: Install tmate via WSL
        shell: pwsh
        run: |
          wsl --install -y || true

      - name: Start SSH (via WSL tmate)
        shell: pwsh
        run: |
          wsl bash -lc "
            sudo apt update || true
            sudo apt install -y tmate || true

            tmate -S /tmp/tmate.sock new-session -d
            tmate -S /tmp/tmate.sock wait tmate-ready

            echo 'SSH URL:'
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

      - name: Keep alive
        shell: pwsh
        run: |
          while ($true) {
            Write-Output 'Windows runner active...'
            Start-Sleep -Seconds 60
          }
