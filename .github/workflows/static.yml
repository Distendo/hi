name: Windows Stable SSH Session

on:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System info
        shell: pwsh
        run: |
          systeminfo
          whoami

      - name: Install WSL (safe init)
        shell: pwsh
        run: |
          wsl --install -y || echo "WSL already installed"

      - name: Setup Linux environment in WSL
        shell: pwsh
        run: |
          wsl bash -lc "
            sudo apt update || true
            sudo apt install -y tmate || true
          "

      - name: Start SSH session (tmate)
        shell: pwsh
        run: |
          wsl bash -lc "
            tmate -S /tmp/tmate.sock new-session -d
            tmate -S /tmp/tmate.sock wait tmate-ready

            echo '========================'
            echo 'SSH ACCESS LINK:'
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
            echo '========================'
          "

      - name: Safe keep alive (NO infinite loop)
        shell: pwsh
        run: |
          for ($i = 0; $i -lt 120; $i++) {
            Write-Output "Windows runner alive... $i"
            Start-Sleep -Seconds 30
          }

      - name: Finish job
        shell: pwsh
        run: |
          Write-Output "Session ended safely."
