name: ALDL macOS Remote X11

on:
  workflow_dispatch:
    inputs:
      user_ip:
        description: "94.20.67.0"
        required: true
        default: "127.0.0.1"

jobs:
  remote-x11:
    runs-on: macos-latest
    timeout-minutes: 360

    steps:

      #########################################################################
      # CHECKOUT
      #########################################################################
      - uses: actions/checkout@v4

      #########################################################################
      # INSTALL XQUARTZ + X11 APPS
      #########################################################################
      - name: Install packages
        run: |
          brew install --cask xquartz

          brew install \
            xterm \
            xeyes \
            mesa

      #########################################################################
      # SHOW INFO
      #########################################################################
      - name: Show info
        run: |
          echo ""
          echo "========================================="
          echo "        ALDL macOS REMOTE X11"
          echo "========================================="
          echo ""

          echo "Target DISPLAY:"
          echo "${{ github.event.inputs.user_ip }}:0"
          echo ""

      #########################################################################
      # TEST TCP 6000
      #########################################################################
      - name: Test X11 port
        run: |
          echo "Testing X11 connection..."

          if nc -zv ${{ github.event.inputs.user_ip }} 6000; then
            echo ""
            echo "SUCCESS: Port 6000 reachable"
          else
            echo ""
            echo "ERROR: Cannot connect to X11"
            echo ""
            echo "You must:"
            echo "1. Start XQuartz locally"
            echo "2. Enable:"
            echo "   Preferences -> Security"
            echo "   Allow connections from network clients"
            echo "3. Run locally:"
            echo "   xhost +"
            echo "4. Open TCP port 6000"
            exit 1
          fi

      #########################################################################
      # EXPORT DISPLAY
      #########################################################################
      - name: Export DISPLAY
        run: |
          echo "DISPLAY=${{ github.event.inputs.user_ip }}:0" >> $GITHUB_ENV

      #########################################################################
      # DISPLAY CHECK
      #########################################################################
      - name: Display info
        run: |
          export DISPLAY=${{ github.event.inputs.user_ip }}:0

          echo "DISPLAY=$DISPLAY"

      #########################################################################
      # OPEN XTERM
      #########################################################################
      - name: Launch xterm
        run: |
          export DISPLAY=${{ github.event.inputs.user_ip }}:0

          echo "Launching xterm..."

          timeout 20 xterm || true

      #########################################################################
      # OPEN XEYES
      #########################################################################
      - name: Launch xeyes
        run: |
          export DISPLAY=${{ github.event.inputs.user_ip }}:0

          timeout 20 xeyes || true

      #########################################################################
      # OPEN GLXGEARS
      #########################################################################
      - name: Launch GLX gears
        run: |
          export DISPLAY=${{ github.event.inputs.user_ip }}:0

          timeout 20 glxgears || true

      #########################################################################
      # SYSTEM INFO
      #########################################################################
      - name: System info
        run: |
          echo ""
          echo "========================================="
          echo "SYSTEM INFO"
          echo "========================================="
          echo ""

          sw_vers

          echo ""
          uname -a

          echo ""
          df -h

      #########################################################################
      # KEEP RUNNER ALIVE
      #########################################################################
      - name: Keep alive
        run: |
          while true; do
            echo "ALDL macOS X11 RUNNING"
            date
            sleep 60
          done
