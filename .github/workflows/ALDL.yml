name: ALDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Choose operating system"
        required: true
        default: "arch"
        type: choice
        options:
          - ubuntu
          - arch
          - macos
          - windows

jobs:
  aldl:
    name: ALDL-${{ github.event.inputs.os }}

    runs-on: ${{ 
      github.event.inputs.os == 'macos' && 'macos-latest' ||
      github.event.inputs.os == 'windows' && 'windows-latest' ||
      'ubuntu-latest'
    }}

    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      ####################################################################
      # UBUNTU MODE
      ####################################################################

      - name: Ubuntu Mode
        if: github.event.inputs.os == 'ubuntu'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmate neofetch

          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

          echo ""
          echo "============== UBUNTU SSH =============="
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "========================================"
          echo ""

          echo ""
          echo "============= UBUNTU WEB ==============="
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo "========================================"
          echo ""

          neofetch || true

      ####################################################################
      # ARCH MODE
      ####################################################################

      - name: Verify Docker
        if: github.event.inputs.os == 'arch'
        run: |
          sudo docker --version

      - name: Pull Arch Linux
        if: github.event.inputs.os == 'arch'
        run: |
          sudo docker pull archlinux:latest

      - name: Start Arch Container
        if: github.event.inputs.os == 'arch'
        run: |
          sudo docker run -dit \
            --name archbox \
            --hostname ALDL \
            --privileged \
            archlinux:latest

      - name: Setup Arch Linux
        if: github.event.inputs.os == 'arch'
        run: |
          sudo docker exec archbox bash -c "
            pacman -Sy --noconfirm archlinux-keyring &&
            pacman -Syu --noconfirm &&
            pacman -S --noconfirm \
              base-devel \
              git \
              curl \
              wget \
              sudo \
              vim \
              nano \
              htop \
              neofetch \
              openssh \
              tmux \
              tmate
          "

      - name: Start Arch tmate
        if: github.event.inputs.os == 'arch'
        run: |
          sudo docker exec -d archbox bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

          sleep 10

      - name: Show Arch SSH
        if: github.event.inputs.os == 'arch'
        run: |
          echo ""
          echo "=============== ARCH SSH ==============="

          sudo docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

          echo "========================================"
          echo ""

          echo ""
          echo "=============== ARCH WEB ==============="

          sudo docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          "

          echo "========================================"
          echo ""

      ####################################################################
      # MACOS MODE
      ####################################################################

      - name: macOS Mode
        if: github.event.inputs.os == 'macos'
        run: |
          brew install tmate neofetch || true

          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

          echo ""
          echo "=============== MACOS SSH =============="
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo "========================================"
          echo ""

          echo ""
          echo "=============== MACOS WEB =============="
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo "========================================"
          echo ""

          neofetch || true

      ####################################################################
      # WINDOWS MODE
      ####################################################################

      - name: Windows Mode
        if: github.event.inputs.os == 'windows'
        shell: powershell
        run: |
          choco install git -y
          choco install openssh -y

          Write-Host ""
          Write-Host "=========== WINDOWS MODE ==========="
          Write-Host "Interactive SSH is limited on GitHub Windows runners."
          Write-Host "Use PowerShell commands directly in workflow."
          Write-Host "===================================="

          systeminfo

      ####################################################################
      # KEEP ALIVE
      ####################################################################

      - name: Keep ALDL Alive
        run: |
          echo "ALDL session active"

          while true; do
            sleep 60
          done
