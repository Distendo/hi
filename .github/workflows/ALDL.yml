name: ALDL

on:
  workflow_dispatch:

jobs:
  arch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

     
      - name: Verify Docker
        run: |
          sudo docker --version
          sudo docker info

      - name: Pull Arch Linux
        run: |
          sudo docker pull archlinux:latest

      - name: Start privileged Arch container
        run: |
          sudo docker run -dit \
            --name archbox \
            --hostname archbox \
            --privileged \
            archlinux:latest

      - name: Initialize Arch Linux
        run: |
          sudo docker exec archbox bash -c "
            pacman -Sy --noconfirm archlinux-keyring &&
            pacman -Syu --noconfirm &&
            pacman -S --noconfirm \
              base-devel \
              git \
              curl \
              wget \
              sudo \
              vim \
              nano \
              htop \
              neofetch \
              openssh \
              tmux \
              tmate
          "

      - name: Configure tmate inside Arch
        run: |
          sudo docker exec archbox bash -c "
            mkdir -p /root/.tmate
          "

      - name: Start internal tmate session
        run: |
          sudo docker exec -d archbox bash -c "
            tmate -F
          "

      - name: Wait for tmate socket
        run: |
          echo 'Waiting for internal Arch tmate...'

          for i in {1..30}; do
            sudo docker exec archbox bash -c "
              tmate display -p '#{tmate_ssh}' >/dev/null 2>&1
            " && break

            sleep 2
          done

      - name: Show Arch Linux SSH session
        run: |
          echo ""
          echo "=========== ARCH LINUX TMATE SSH ==========="

          sudo docker exec archbox bash -c "
            tmate display -p '#{tmate_ssh}'
          "

          echo "============================================"
          echo ""

          echo ""
          echo "=========== ARCH LINUX WEB SHELL ==========="

          sudo docker exec archbox bash -c "
            tmate display -p '#{tmate_web}'
          "

          echo "============================================"
          echo ""

      - name: Show system info
        run: |
          sudo docker exec archbox bash -c "
            echo '=== ARCH INFO ==='
            cat /etc/os-release
            echo
            uname -a
            echo
            neofetch || true
          "

      - name: Keep Arch container alive
        run: |
          echo "Arch Linux + internal tmate is running."

          while true; do
            sleep 60
          done
