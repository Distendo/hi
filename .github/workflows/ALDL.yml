name: ALDL

on:
  workflow_dispatch:

jobs:
  arch:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          sudo docker --version
          sudo docker info

      - name: Pull Arch Linux
        run: |
          sudo docker pull archlinux:latest

      - name: Start privileged Arch container
        run: |
          sudo docker run -dit \
            --name archbox \
            --hostname ALDL \
            --privileged \
            archlinux:latest

      - name: Initialize Arch Linux
        run: |
          sudo docker exec archbox bash -c "
            pacman -Sy --noconfirm archlinux-keyring &&
            pacman -Syu --noconfirm &&
            pacman -S --noconfirm \
              base-devel \
              git \
              curl \
              wget \
              sudo \
              vim \
              nano \
              htop \
              openssh \
              tmate
          "

      - name: Configure container
        run: |
          sudo docker exec archbox bash -c "
            echo 'root:root' | chpasswd
            mkdir -p /root/.tmate
          "

      - name: Start internal tmate session
        run: |
          sudo docker exec -d archbox bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait for tmate readiness
        run: |
          echo 'Waiting for internal ALDL tmate session...'

          for i in {1..30}; do
            if sudo docker exec archbox bash -c "
              tmate -S /tmp/tmate.sock wait tmate-ready
            "; then
              echo "tmate ready"
              break
            fi

            sleep 2
          done

      - name: Show ALDL SSH session
        run: |
          echo ""
          echo "============== ALDL SSH ================="

          sudo docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

          echo "========================================="
          echo ""

          echo ""
          echo "============= ALDL WEB SHELL (beta) ============"

          sudo docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          "

          echo "========================================="
          echo ""

      - name: Show ALDL system info
        run: |
          sudo docker exec archbox bash -c "
            echo '=== ALDL SYSTEM INFO ==='
            cat /etc/os-release
            echo
            uname -a
            echo
            neofetch || true
          "

      - name: Keep ALDL alive
        run: |
          echo "ALDL Arch Linux environment is running."

          while true; do
            sleep 60
          done
