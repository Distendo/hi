name: ALDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Select OS"
        required: true
        default: ubuntu
        type: choice
        options:
          - ubuntu
          - arch
          - macos
          - windows

jobs:

  ######################################################################
  # UBUNTU
  ######################################################################

  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install tmate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmate neofetch

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: |
          echo "========== UBUNTU SSH =========="
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo ""
          echo "========== UBUNTU WEB =========="
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo ""

      - name: System info
        run: |
          neofetch || true

      - name: Keep alive
        run: |
          while true; do
            sleep 60
          done

  ######################################################################
  # ARCH
  ######################################################################

  arch:
    if: github.event.inputs.os == 'arch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker
        run: |
          docker --version

      - name: Pull Arch
        run: |
          docker pull archlinux:latest

      - name: Create container
        run: |
          docker run -dit \
            --name archbox \
            --hostname ALDL \
            --privileged \
            archlinux:latest

      - name: Install packages
        run: |
          docker exec archbox bash -c "
            pacman -Sy --noconfirm archlinux-keyring &&
            pacman -Syu --noconfirm &&
            pacman -S --noconfirm \
              tmate \
              tmux \
              openssh \
              curl \
              wget \
              git \
              nano \
              vim \
              htop \
              neofetch
          "

      - name: Start tmate in Arch
        run: |
          docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait for tmate
        run: |
          sleep 15

      - name: Show Arch SSH
        run: |
          echo "=========== ARCH SSH ==========="

          docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

          echo ""
          echo "=========== ARCH WEB ==========="

          docker exec archbox bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          "

          echo ""

      - name: Arch info
        run: |
          docker exec archbox neofetch || true

      - name: Keep alive
        run: |
          while true; do
            sleep 60
          done

  ######################################################################
  # MACOS
  ######################################################################

  macos:
    if: github.event.inputs.os == 'macos'
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew update
          brew install tmate neofetch

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: |
          echo "=========== MACOS SSH =========="
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          echo ""
          echo "=========== MACOS WEB =========="
          tmate -S /tmp/tmate.sock display -p '#{tmate_web}'
          echo ""

      - name: System info
        run: |
          neofetch || true

      - name: Keep alive
        run: |
          while true; do
            sleep 60
          done

  ######################################################################
  # WINDOWS
  ######################################################################

  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSH
        shell: powershell
        run: |
          choco install openssh -y

      - name: System info
        shell: powershell
        run: |
          systeminfo

      - name: Keep alive
        shell: powershell
        run: |
          while ($true) {
            Start-Sleep -Seconds 60
          }
