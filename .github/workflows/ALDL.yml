name: ALDL

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Select OS"
        required: true
        default: ubuntu
        type: choice
        options:
          - ubuntu
          - arch
          - debian
          - alpine
          - fedora
          - kali
          - macos
          - windows

jobs:

  ####################################################################
  # UBUNTU (native runner)
  ####################################################################
  ubuntu:
    if: github.event.inputs.os == 'ubuntu'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install tmate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tmate

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

          echo "UBUNTU SSH:"
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # ARCH
  ####################################################################
  arch:
    if: github.event.inputs.os == 'arch'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start Arch container
        run: |
          docker pull archlinux:latest
          docker run -dit --name os archlinux:latest

      - name: Install tmate
        run: |
          docker exec os bash -c "
            pacman -Sy --noconfirm &&
            pacman -S --noconfirm tmate
          "

      - name: Start tmate
        run: |
          docker exec -d os bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait tmate
        run: |
          sleep 10
          docker exec os bash -c "
            tmate -S /tmp/tmate.sock wait tmate-ready
          "

      - name: Show SSH
        run: |
          echo "ARCH SSH:"
          docker exec os bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # DEBIAN
  ####################################################################
  debian:
    if: github.event.inputs.os == 'debian'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker run -dit --name os debian:latest

      - name: Install tmate
        run: |
          docker exec os bash -c "
            apt-get update &&
            apt-get install -y tmate
          "

      - name: Start tmate
        run: |
          docker exec -d os bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait
        run: sleep 10

      - name: Show SSH
        run: |
          docker exec os bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # ALPINE
  ####################################################################
  alpine:
    if: github.event.inputs.os == 'alpine'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker run -dit --name os alpine:latest

      - name: Install tmate
        run: |
          docker exec os sh -c "
            apk add --no-cache tmate
          "

      - name: Start tmate
        run: |
          docker exec -d os sh -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait
        run: sleep 10

      - name: Show SSH
        run: |
          docker exec os sh -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # FEDORA
  ####################################################################
  fedora:
    if: github.event.inputs.os == 'fedora'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker run -dit --name os fedora:latest

      - name: Install tmate
        run: |
          docker exec os bash -c "
            dnf install -y tmate
          "

      - name: Start tmate
        run: |
          docker exec -d os bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait
        run: sleep 10

      - name: Show SSH
        run: |
          docker exec os bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # KALI
  ####################################################################
  kali:
    if: github.event.inputs.os == 'kali'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Start container
        run: |
          docker run -dit --name os kalilinux/kali-rolling:latest

      - name: Install tmate
        run: |
          docker exec os bash -c "
            apt update &&
            apt install -y tmate
          "

      - name: Start tmate
        run: |
          docker exec -d os bash -c "
            tmate -S /tmp/tmate.sock new-session -d
          "

      - name: Wait
        run: sleep 10

      - name: Show SSH
        run: |
          docker exec os bash -c "
            tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'
          "

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # MACOS
  ####################################################################
  macos:
    if: github.event.inputs.os == 'macos'
    runs-on: macos-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install tmate
        run: brew install tmate

      - name: Start tmate
        run: |
          tmate -S /tmp/tmate.sock new-session -d
          tmate -S /tmp/tmate.sock wait tmate-ready

      - name: Show SSH
        run: |
          tmate -S /tmp/tmate.sock display -p '#{tmate_ssh}'

      - name: Keep alive
        run: sleep infinity

  ####################################################################
  # WINDOWS (limited)
  ####################################################################
  windows:
    if: github.event.inputs.os == 'windows'
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: System info
        shell: powershell
        run: systeminfo

      - name: Keep alive
        shell: powershell
        run: Start-Sleep -Seconds 999999
