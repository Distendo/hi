name: Strong SSH Container

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Upgrade system (heavy setup)
        run: |
          sudo apt update
          sudo apt upgrade -y

          sudo apt install -y \
            build-essential \
            curl wget git nano htop tmux screen unzip zip \
            python3 python3-pip \
            nodejs npm \
            openssh-client openssh-server \
            net-tools iproute2 \
            nginx \
            docker.io || true

      - name: Configure environment
        run: |
          echo "export LANG=C.UTF-8" >> ~/.bashrc
          echo "export TERM=xterm-256color" >> ~/.bashrc

          mkdir -p ~/workspace
          cd ~/workspace

      - name: Start SSH session (tmate)
        uses: mxschmitt/action-tmate@v3

      - name: Keep alive loop
        run: |
          while true; do
            echo "[SSH CONTTAINER ACTIVE]"
            sleep 60
          done
